app = "aadhya-backend"
primary_region = "sin"

[build]

[env]
  PORT = "8080"
  LLM_BASE_URL = "https://api.groq.com/openai/v1"
  LLM_MODEL = "llama-3.1-8b-instant"
  CORS_ORIGINS = "https://aadhya-frontend.vercel.app"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
