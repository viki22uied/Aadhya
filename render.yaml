services:
  - type: web
    name: aadhya-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: LLM_MODEL
        value: llama-3.1-8b-instant
      - key: LLM_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: http://localhost:3000
      - key: PYTHON_VERSION
        value: 3.10.11

  - type: web
    name: aadhya-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://aadhya-backend.onrender.com
